<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real-Time Speech Translator</title>
    <style>
        :root { --primary: #ec4899; --secondary: #4f46e5; --surface: #ffffff; --background: #f1f5f9; --text: #1e293b; --danger: #ef4444; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: linear-gradient(135deg, var(--secondary), var(--primary)); color: var(--text); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: var(--surface); padding: 40px; border-radius: 16px; box-shadow: 0 20px 40px rgba(0,0,0,0.2); width: 100%; max-width: 450px; position: relative; }
        h1 { margin-top: 0; font-size: 26px; text-align: center; background: -webkit-linear-gradient(var(--secondary), var(--primary)); background-clip: text; -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: 600; margin-bottom: 8px; font-size: 14px; color: #475569; }
        input, select { width: 100%; padding: 12px; border: 2px solid #e2e8f0; border-radius: 10px; font-size: 15px; box-sizing: border-box; transition: border-color 0.3s; }
        input:focus, select:focus { outline: none; border-color: var(--secondary); }
        button { width: 100%; padding: 14px; background: linear-gradient(135deg, var(--secondary), var(--primary)); color: white; border: none; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; transition: transform 0.2s, box-shadow 0.2s; box-shadow: 0 4px 6px rgba(79, 70, 229, 0.3); }
        button:hover { transform: translateY(-2px); box-shadow: 0 6px 12px rgba(79, 70, 229, 0.4); }
        button:disabled { background: #94a3b8; cursor: not-allowed; transform: none; box-shadow: none; }
        
        .danger-btn { background: var(--danger); box-shadow: 0 4px 6px rgba(239, 68, 68, 0.3); margin-top: 15px; }
        .danger-btn:hover { background: #dc2626; box-shadow: 0 6px 12px rgba(239, 68, 68, 0.4); }

        /* Active Call UI */
        #callUI { display: none; }
        .call-header { text-align: center; margin-bottom: 20px; }
        .status-badge { display: inline-block; background: #fef08a; color: #854d0e; padding: 6px 16px; border-radius: 20px; font-size: 13px; font-weight: bold; transition: all 0.3s; }
        .status-badge.connected { background: #dcfce7; color: #166534; }
        .session-meta { margin-top: 10px; font-size: 12px; color: #475569; display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; }
        .session-pill { background: #eef2ff; color: #3730a3; padding: 6px 10px; border-radius: 6px; font-weight: 600; border: 1px solid #c7d2fe; }
        
        .controls-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        
        /* Toggle Switch */
        .toggle-label { font-size: 14px; font-weight: 600; color: #475569; display: flex; align-items: center; gap: 8px; cursor: pointer; }
        .switch { position: relative; display: inline-block; width: 36px; height: 20px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #cbd5e1; transition: .4s; border-radius: 20px; }
        .slider:before { position: absolute; content: ""; height: 14px; width: 14px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--secondary); }
        input:checked + .slider:before { transform: translateX(16px); }

        .transcript-box { background: #f8fafc; border: 2px solid #e2e8f0; border-radius: 10px; height: 250px; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .subtitle { padding: 12px 16px; border-radius: 12px; background: white; box-shadow: 0 2px 8px rgba(0,0,0,0.04); font-size: 14px; line-height: 1.5; border-left: 4px solid var(--primary); animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .subtitle-name { font-weight: 700; font-size: 12px; color: var(--secondary); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
        .system-msg { text-align: center; font-size: 13px; color: #64748b; font-style: italic; }
    </style>
</head>
<body>

<div class="container" id="lobbyUI">
    <h1>Real-Time Speech Translator</h1>
    
    <div class="form-group">
        <label>Room ID (Share this with your partner)</label>
        <input type="text" id="roomInput" placeholder="e.g., meeting-123" value="lobby">
    </div>
    <div class="form-group">
        <label>Your Display Name</label>
        <input type="text" id="userInput" placeholder="e.g., Alex">
    </div>

    <div class="form-group">
        <label>1. I will be speaking in:</label>
        <select id="spokenLang">
            <option value="en">English</option>
            <option value="hi">Hindi</option>
            <option value="es">Spanish</option>
            <option value="fr">French</option>
            <option value="de">German</option>
            <option value="zh">Chinese</option>
            <option value="ar">Arabic</option>
            <option value="ml">Malayalam</option>
            <option value="ta">Tamil</option>
            <option value="tl">Tagalog</option>
        </select>
    </div>
    
    <div class="form-group">
        <label>2. The other person should hear me in:</label>
        <select id="targetLang">
            <option value="hi">Hindi</option>
            <option value="es">Spanish</option>
            <option value="fr">French</option>
            <option value="en">English</option>
            <option value="de">German</option>
            <option value="zh">Chinese</option>
            <option value="ar">Arabic</option>
            <option value="ml">Malayalam</option>
            <option value="ta">Tamil</option>
            <option value="tl">Tagalog</option>
        </select>
    </div>
    
    <button id="joinBtn">Join Secure Call</button>
</div>

<div class="container" id="callUI">
    <div class="call-header">
        <div class="status-badge" id="callStatus">Waiting for partner...</div>
        <div class="session-meta">
            <span class="session-pill" id="selfNamePill">You: -</span>
            <span class="session-pill" id="partnerPill">Partner: waiting...</span>
            <span class="session-pill" id="spokenPill">Speaking: -</span>
            <span class="session-pill" id="targetPill">Hearing: -</span>
        </div>
    </div>
    
    <div class="controls-row">
        <label class="toggle-label">
            <div class="switch">
                <input type="checkbox" id="transcriptToggle" checked>
                <span class="slider"></span>
            </div>
            Show Transcripts
        </label>
    </div>
    
    <div class="transcript-box" id="transcripts">
        <div class="system-msg">Audio pipeline open. Waiting for speech...</div>
    </div>
    
    <button id="endCallBtn" class="danger-btn">End Call</button>
</div>

<script>
    let ws;
    let audioContext;
    let playbackContext;
    let localStream;
    let localProcessor;
    let localSource;
    let selfName = "";
    let partnerName = "";
    const MAX_PLAYBACK_LEAD_SECONDS = 0.2;

    const urlParams = new URLSearchParams(window.location.search);
    if(urlParams.get('room')) document.getElementById('roomInput').value = urlParams.get('room');

    function appendTranscript(speaker, text) {
        const transcriptBox = document.getElementById('transcripts');
        transcriptBox.innerHTML += `
            <div class="subtitle">
                <div class="subtitle-name">${speaker}</div>
                <div>${text}</div>
            </div>`;
        transcriptBox.scrollTop = transcriptBox.scrollHeight;
    }

    function resetCallUI() {
        document.getElementById('callUI').style.display = 'none';
        document.getElementById('lobbyUI').style.display = 'block';
        document.getElementById('transcripts').innerHTML = '<div class="system-msg">Audio pipeline open. Waiting for speech...</div>';

        const statusBadge = document.getElementById('callStatus');
        statusBadge.innerText = "Waiting for partner...";
        statusBadge.classList.remove("connected");
        document.getElementById('selfNamePill').innerText = "You: -";
        document.getElementById('partnerPill').innerText = "Partner: waiting...";
        document.getElementById('spokenPill').innerText = "Speaking: -";
        document.getElementById('targetPill').innerText = "Hearing: -";
    }

    document.getElementById('joinBtn').onclick = async () => {
        const room = document.getElementById('roomInput').value.trim();
        const user = document.getElementById('userInput').value.trim();
        const spokenSelect = document.getElementById('spokenLang');
        const targetSelect = document.getElementById('targetLang');
        
        const spokenLang = spokenSelect.value;
        const targetLang = targetSelect.value;

        if(!room || !user) { alert("Please fill in all fields."); return; }

        selfName = user;
        partnerName = "";

        // Swap UI & Set Pills
        document.getElementById('lobbyUI').style.display = 'none';
        document.getElementById('callUI').style.display = 'block';
        window.history.pushState({}, '', `?room=${room}`);
        
        document.getElementById('selfNamePill').innerText = `You: ${user}`;
        document.getElementById('partnerPill').innerText = "Partner: waiting...";
        // Grab the actual text names of the languages (e.g. "Spanish" instead of "es")
        document.getElementById('spokenPill').innerText = `Speaking: ${spokenSelect.options[spokenSelect.selectedIndex].text}`;
        document.getElementById('targetPill').innerText = `Hearing: ${targetSelect.options[targetSelect.selectedIndex].text}`;

        const wsProtocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
        ws = new WebSocket(`${wsProtocol}//${window.location.host}/ws?room=${room}&user=${user}&spoken_lang=${spokenLang}&target_lang=${targetLang}`);
        
        ws.binaryType = 'arraybuffer';
        playbackContext = new AudioContext({ sampleRate: 24000, latencyHint: 'interactive' });
        let nextPlayTime = playbackContext.currentTime;

        ws.onmessage = async (event) => {
            const statusBadge = document.getElementById('callStatus');
            if (!statusBadge.classList.contains("connected")) {
                statusBadge.innerText = "Call Connected - Secure";
                statusBadge.classList.add("connected");
            }

            if (typeof event.data === "string") {
                const data = JSON.parse(event.data);
                if (data.type === "status") {
                    partnerName = data.partner || partnerName;
                    document.getElementById('partnerPill').innerText = `Partner: ${partnerName}`;
                    appendTranscript('System', data.message);
                    return;
                }
                if (data.type === "transcript") {
                    const speakerLabel = data.speaker === selfName ? `${data.speaker} (You)` : `${data.speaker} (Translated)`;
                    appendTranscript(speakerLabel, data.text);
                }
            } 
            else {
                const audioData = new Int16Array(event.data);
                const float32Data = new Float32Array(audioData.length);
                for (let i = 0; i < audioData.length; i++) {
                    float32Data[i] = audioData[i] / 0x7FFF;
                }
                
                const buffer = playbackContext.createBuffer(1, float32Data.length, 24000);
                buffer.getChannelData(0).set(float32Data);
                const source = playbackContext.createBufferSource();
                source.buffer = buffer;
                source.connect(playbackContext.destination);
                
                if (nextPlayTime < playbackContext.currentTime) {
                    nextPlayTime = playbackContext.currentTime;
                }
                if (nextPlayTime > playbackContext.currentTime + MAX_PLAYBACK_LEAD_SECONDS) {
                    nextPlayTime = playbackContext.currentTime + 0.05;
                }
                source.start(nextPlayTime);
                nextPlayTime += buffer.duration;
            }
        };

        localStream = await navigator.mediaDevices.getUserMedia({
            audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: true }
        });
        audioContext = new AudioContext({ sampleRate: 16000 });
        localSource = audioContext.createMediaStreamSource(localStream);
        localProcessor = audioContext.createScriptProcessor(512, 1, 1);
        
        localSource.connect(localProcessor);
        localProcessor.connect(audioContext.destination);

        document.getElementById('endCallBtn').onclick = () => {
            if (ws) ws.close();
            if (localProcessor) localProcessor.disconnect();
            if (localSource) localSource.disconnect();
            if (audioContext) audioContext.close();
            if (playbackContext) playbackContext.close();
            if (localStream) localStream.getTracks().forEach(track => track.stop());

            ws = null; audioContext = null; playbackContext = null;
            localStream = null; localProcessor = null; localSource = null;

            resetCallUI();
        };

        document.getElementById('transcriptToggle').onchange = (e) => {
            document.getElementById('transcripts').style.display = e.target.checked ? 'flex' : 'none';
        };

        localProcessor.onaudioprocess = (e) => {
            e.outputBuffer.getChannelData(0).fill(0);
            if (ws.readyState === WebSocket.OPEN) {
                const inputData = e.inputBuffer.getChannelData(0);
                const pcmData = new Int16Array(inputData.length);
                for (let i = 0; i < inputData.length; i++) {
                    pcmData[i] = Math.max(-1, Math.min(1, inputData[i])) * 0x7FFF;
                }
                ws.send(pcmData.buffer);
            }
        };
    };
</script>
</body>
</html>
