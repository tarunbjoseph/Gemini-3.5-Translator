<!DOCTYPE html>
<html>
<head>
    <title>Gemini Live Translator Prototype</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px; }
        button { padding: 15px 30px; font-size: 18px; cursor: pointer; border-radius: 8px; border: 1px solid #ccc; background-color: #007bff; color: white;}
        button:disabled { background-color: #6c757d; cursor: not-allowed; }
    </style>
</head>
<body>
    <h1>Real-Time Translator</h1>
    <p>Speak in English, hear the translation in Spanish.</p>
    <button id="startBtn">Start Call</button>
    
    <script>
        let ws;
        let audioContext;

        document.getElementById('startBtn').onclick = async () => {
            document.getElementById('startBtn').disabled = true;
            document.getElementById('startBtn').innerText = "Connecting...";

            // 1. Connect to your Python backend
            ws = new WebSocket(`ws://${location.host}/ws`);
            ws.binaryType = 'arraybuffer';

            // 2. Setup Audio Playback for Gemini's translated voice (24kHz)
            const playbackContext = new AudioContext({ sampleRate: 24000 });
            let nextPlayTime = playbackContext.currentTime;

            ws.onmessage = async (event) => {
                // When audio arrives from Gemini, queue it up to play
                const audioData = new Int16Array(event.data);
                const float32Data = new Float32Array(audioData.length);
                for (let i = 0; i < audioData.length; i++) {
                    float32Data[i] = audioData[i] / 0x7FFF;
                }
                
                const buffer = playbackContext.createBuffer(1, float32Data.length, 24000);
                buffer.getChannelData(0).set(float32Data);
                const source = playbackContext.createBufferSource();
                source.buffer = buffer;
                source.connect(playbackContext.destination);
                
                // Keep playback smooth
                if (nextPlayTime < playbackContext.currentTime) {
                    nextPlayTime = playbackContext.currentTime;
                }
                source.start(nextPlayTime);
                nextPlayTime += buffer.duration;
            };

            ws.onopen = async () => {
                document.getElementById('startBtn').innerText = "Listening... Speak now!";
                
                // 3. Request Microphone Access and capture at 16kHz
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                audioContext = new AudioContext({ sampleRate: 16000 });
                const source = audioContext.createMediaStreamSource(stream);
                
                // Process the raw audio data
                const processor = audioContext.createScriptProcessor(4096, 1, 1);
                source.connect(processor);
                processor.connect(audioContext.destination);

                processor.onaudioprocess = (e) => {
                    if (ws.readyState === WebSocket.OPEN) {
                        const inputData = e.inputBuffer.getChannelData(0);
                        const pcmData = new Int16Array(inputData.length);
                        for (let i = 0; i < inputData.length; i++) {
                            pcmData[i] = Math.max(-1, Math.min(1, inputData[i])) * 0x7FFF;
                        }
                        ws.send(pcmData.buffer); // Send mic data to server
                    }
                };
            };
        };
    </script>
</body>
</html>
